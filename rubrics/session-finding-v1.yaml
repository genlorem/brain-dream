# Rubric: session-finding v1
#
# Критерии «что считать находкой» при анализе сессий Claude Code.
# Используется session-observer'ом (автоматический проход) и /learn (ручной).
# Хранится здесь, чтобы оба агента судили по одинаковым правилам.
#
# Версия закреплена в имени файла — при изменении создавай v2, не редактируй v1 in-place.

id: session-finding-v1
version: "1"
created_at: 2026-06-03
applies_to:
  - session-observer
  - learn

# ── Типы находок (что считать worth saving) ───────────────────────────────────

finding_types:

  lesson:
    description: |
      Surprise / trap / workaround / наблюдение, которое удивило или сэкономит
      время в будущем. Включает: поведение, отличавшееся от ожидания; баги тулов;
      устаревшие доки; недокументированные ограничения API; race conditions;
      escaping-ловушки; HSTS/caching-сюрпризы.
    save_when: |
      Обнаружили что-то неочевидное — «о, так вот почему это не работало».
    examples:
      - "rclone full-scope пишет в Drive, MCP/adc только читают"
      - "BRAIN_ROOT должен указывать на bare-репо, не рабочую копию"

  decision:
    description: |
      Архитектурное / инфра / процессное решение с trade-off. Точка, в которой
      выбор был неочевидным и мог пойти по-другому.
    save_when: |
      Явный выбор из двух+ вариантов с обоснованием.
    examples:
      - "Курсор session-observer по индексу сообщения, не по байтам — надёжнее при дозаписи"
      - "brain-dream не читает dream-домен как input, чтобы не пересказывать сны"

  procedure:
    description: |
      Переиспользуемая процедура / runbook / не-очевидная команда/запрос, собранные
      методом тыка. SQL, curl, shell-трюки, последовательности шагов.
    save_when: |
      Придётся повторить в будущем и нельзя восстановить из документации.
    examples:
      - "Как сделать git commit от другого email для bare-репо"
      - "jq-однострочник для компактного парсинга jsonl с fallback"

  note:
    description: |
      Статус-сдвиг живого проекта, связь между проектами/сервисами/сущностями.
      Новые зависимости, которые не очевидны из одного домена.
    save_when: |
      Обнаружена связь, которую ни один отдельный домен сам не увидит;
      или важный статус-факт (что-то переехало, что-то изменило поведение).
    examples:
      - "session-observer cursor файл живёт в DREAM_NODE_ROOT, не в BRAIN_DREAM_REPO"
      - "learn-ledger не существует пока /learn не вызван ни разу — терпимо"

# ── Фильтры (что НЕ сохранять) ────────────────────────────────────────────────

negative_filters:
  - Рутинные успешные команды без сюрпризов
  - Секреты, токены, пароли, ключи API (указать где лежит — можно, значение — нельзя)
  - Общие принципы из документации, которые воспроизводимы по запросу
  - Сырые конфиги и операционные команды без изюминки
  - Факты, которые уже очевидны из имён переменных/функций

# ── Порог confidence ──────────────────────────────────────────────────────────

confidence:
  minimum_to_record: 0.30
  default: 0.60
  guidance:
    "0.3-0.5": "Гипотеза: наблюдение есть, но требует подтверждения"
    "0.6-0.8": "Вероятно: хорошо обоснованный инсайт из реального поведения"
    "0.9-1.0": "Уверен: воспроизводимый, проверенный факт с прямым применением"

# ── Мета ──────────────────────────────────────────────────────────────────────

notes: |
  При сомнении — ниже confidence, но всё равно записать (dedup'ер удалит повтор;
  потеря находки хуже дублирования). Дублирование убирается content-hash'ом.
  Продвижение в source-of-truth — только через явный гейт (ручной или авто по hits).
