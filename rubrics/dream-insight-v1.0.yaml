# Rubric: dream-insight v1.0
#
# Семантика: высокий score = инсайт ЦЕННЫЙ, надо продвинуть.
# Шкала: 0..10 на каждой категории. Сложение weighted, нормализуется к [0..1].
#
# Используется dream-critic'ом для решения о promotion в dreams/permanent/.
# Версия закреплена в имени файла — при изменении весов или порога создавай v1.1,
# не редактируй v1.0 in-place (нужна аудит-цепочка: какой инсайт промоутнут под какой рубрикой).
#
# Эволюция:
#   v1.0 (2026-05-31) — первая версия. Веса подобраны эмпирически из fabric autoDream.

id: dream-insight-v1.0
version: "1.0"
created_at: 2026-05-31
applies_to: dream-critic
pass_threshold: 0.65   # weighted score [0..1] для promotion
categories:

  confidence:
    weight: 0.30
    question: |
      Насколько уверенно сформулирован инсайт? Есть ли конкретные источники
      (source_ids), цифры, ссылки на реальные артефакты? Или это домысел/перефразировка?
    scale:
      "0":  "Чистая спекуляция, нет ни одного source_id, ни одной цифры."
      "5":  "Один-два source_id, общая формулировка без specifics."
      "10": "3+ source_id из разных источников, конкретные цифры/имена/ID,
             перепроверяемое утверждение."

  actionability:
    weight: 0.25
    question: |
      Можно ли по этому инсайту сделать конкретный следующий шаг? Кто и что
      должен сделать? Понятно ли, как проверить что шаг сделан?
    scale:
      "0":  "Чисто описательное наблюдение, шага нет."
      "5":  "Шаг намечен, но требует уточнения (кто/где/как)."
      "10": "Шаг конкретен: владелец, файл/тикет, критерий done."

  cross_domain:
    weight: 0.20
    question: |
      Затрагивает ли инсайт несколько доменов brain (travelmart, marquiz, skvo,
      personal, indie, govori, infra, dreams)? Связь — это самое ценное, что
      может найти сон, потому что ни один отдельный домен сам это не увидит.
    scale:
      "0":  "Один домен, локальное наблюдение."
      "5":  "Два домена, slabaya связь (общая тема)."
      "10": "3+ домена, явная структурная связь (одна и та же проблема в
             разных проектах / общий root-cause)."

  relevance:
    weight: 0.15
    question: |
      Актуален ли инсайт ПРЯМО СЕЙЧАС? Не устарел ли (e.g. инсайт про код,
      который уже переписан)? Не про закрытую задачу?
    scale:
      "0":  "Устаревший: явно про прошлое состояние, уже не применимо."
      "5":  "Неясно — нужно сверять с текущим кодом/тикетами."
      "10": "Свежий, относится к активной работе, важный сейчас."

  surprise:
    weight: 0.10
    question: |
      Это non-obvious? Что-то, что НЕ написано прямо в source-ноде, а
      замечено сном (паттерн, противоречие, скрытая связь, упущенная
      возможность)? Или это банальный пересказ source-ноды?
    scale:
      "0":  "Тривиальный пересказ source-ноты."
      "5":  "Перекомбинация известного — полезно, но не открытие."
      "10": "Действительно non-obvious: противоречие, скрытый паттерн,
             связь которая не была явно проговорена."

# Sanity check на сумму весов — должно быть 1.0 ровно.
# 0.30 + 0.25 + 0.20 + 0.15 + 0.10 = 1.00
